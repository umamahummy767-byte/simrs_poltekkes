    <form class="form-pendaftaran">
       <h2>Form Pendaftaran Pasien</h2>

        <label>Nama Pasien</label>
        <input type="text" name="nama" required>

        <label>No RM Pasien</label>
        <input type="text" name="no_rm" required>

        <label>NIK Pasien</label>
        <input type="text" name="nik" required>

        <label>Tanggal Lahir</label>
        <input type="date" name="tgl_lahir" required>

        <label>Tujuan Poliklinik</label>
        <input type="text" name="poli" required>

        <label>Dokter Poliklinik</label>
        <input type="text" name="dokter" required>

        <button type="submit">Simpan</button>
    </form>
